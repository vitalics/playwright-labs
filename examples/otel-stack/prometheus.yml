global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Scrape the OTel Collector's Prometheus exporter.
  # All pw_* metrics and any custom metrics from useCounter/useHistogram
  # are available here as soon as the collector flushes them.
  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889
