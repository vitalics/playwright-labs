services:
  # ── MinIO (S3-compatible storage) ────────────────────────────────────────────
  # Receives the objects uploaded by @playwright-labs/reporter-s3 at run end.
  # Browse at http://localhost:9001 (login: minioadmin / minioadmin).
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # S3 API   ← the reporter talks to this
      - "9001:9001"   # Web UI   ← open in browser
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
